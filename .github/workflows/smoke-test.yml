name: Reproduction smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch first (smaller wheel for CI)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Validate case templates structure
        run: |
          set -e
          for geom in circular_Re200 square_Re150 diamond_Re150; do
            for method in fine coarse dl_amr grad_amr; do
              d="cases/$geom/$method"
              echo "Checking $d..."
              [ -d "$d/0" ]                       || (echo "MISSING: $d/0";                       exit 1)
              [ -d "$d/constant" ]                || (echo "MISSING: $d/constant";                exit 1)
              [ -d "$d/system" ]                  || (echo "MISSING: $d/system";                  exit 1)
              [ -f "$d/system/blockMeshDict" ]    || (echo "MISSING: $d/system/blockMeshDict";    exit 1)
              [ -f "$d/system/controlDict" ]      || (echo "MISSING: $d/system/controlDict";      exit 1)
              [ -f "$d/Allrun" ]                  || (echo "MISSING: $d/Allrun";                  exit 1)
            done
          done
          for geom in circular_Re100 circular_Re150; do
            d="cases/$geom/fine"
            echo "Checking $d..."
            [ -d "$d/0" ]                            || (echo "MISSING: $d/0";                            exit 1)
            [ -d "$d/constant" ]                     || (echo "MISSING: $d/constant";                     exit 1)
            [ -d "$d/system" ]                       || (echo "MISSING: $d/system";                       exit 1)
            [ -f "$d/constant/transportProperties" ] || (echo "MISSING: $d/constant/transportProperties"; exit 1)
          done
          echo "All case templates valid."

      - name: Validate Python imports (third-party)
        run: |
          python -c "import torch, numpy, scipy, matplotlib, pyvista, pandas, sklearn, yaml"

      - name: Validate ml package importable
        run: |
          # Should be importable from repo root
          python -c "from ml.src.models import HeteroDeltaFullRes, UNet"
          python -c "from ml.src.losses import bce_dice, gdl, ssim, sliced_wasserstein"
          python -c "from ml.src.dataloaders import AMRDataset, NormalizeByStats"
          python -c "from ml.src.utils import load_checkpoint, load_norm_stats, setup_logger"

      - name: Validate analysis scripts syntax
        run: |
          for f in analysis/*.py; do
            python -m py_compile "$f"
          done
          echo "All analysis scripts syntax-check pass."

      - name: Validate scripts/*.sh exist and are executable
        run: |
          for s in scripts/*.sh; do
            [ -x "$s" ] || (echo "Not executable: $s"; exit 1)
          done
          echo "All shell scripts executable."

      - name: License & citation files present
        run: |
          for f in LICENSE LICENSE-CODE LICENSE-DATA solver/LICENSE CITATION.cff README.md; do
            [ -f "$f" ] || (echo "MISSING: $f"; exit 1)
          done
          echo "All license/citation files present."
