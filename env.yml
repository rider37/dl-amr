name: dl-amr
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.7
  - scikit-learn>=1.3
  - pyyaml>=6.0
  # CFD/mesh I/O
  - pyvista>=0.43
  - vtk>=9.2
  # PyTorch (CUDA optional; replace 'pytorch-cuda=12.1' line with
  # 'cpuonly' below for a CPU-only environment)
  - pytorch>=2.1
  - torchvision
  - pytorch-cuda=12.1
  # Build tools
  - gcc>=9
  # Misc
  - tqdm
  - rich
  - pip:
      - img2pdf>=0.5      # for PDF figure conversion (optional)
